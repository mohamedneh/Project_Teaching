<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Year English Quiz - University of Tissemsilt</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --secondary: #c9a227;
            --success: #38a169;
            --error: #e53e3e;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #1a202c;
            --text-secondary: #4a5568;
            --border: #e2e8f0;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px; }

        .header {
            background: linear-gradient(135deg, var(--primary), #2d4a6f);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1rem; }

        .container { max-width: 800px; margin: 30px auto; padding: 0 15px; }

        .timer-bar {
            background: var(--secondary);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 600;
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .card-body { padding: 20px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: var(--primary); }

        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .question-number {
            background: var(--primary);
            color: white;
            min-width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-right: 12px;
        }

        .question-title { font-weight: 600; font-size: 1.1rem; flex: 1; line-height: 1.4; }

        .option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover { border-color: var(--primary); background: #f7fafc; }
        .option.selected { border-color: var(--primary); background: #e8f0fe; }
        .option input { margin-right: 12px; pointer-events: none; }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 40px auto;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover { background: var(--primary-light); transform: translateY(-2px); }

        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body { padding: 25px; }

        .score-box {
            text-align: center;
            padding: 30px;
            background: #e8f0fe;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .score-box .score { font-size: 3rem; font-weight: 800; color: var(--primary); }

        .lang-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <button class="lang-btn" onclick="toggleLang()">العربية</button>

    <header class="header">
        <h1 id="mainTitle" data-en="ICT Technical Skills Assessment" data-ar="اختبار مهارات تكنولوجيا المعلومات">ICT Technical Skills Assessment</h1>
        <p>University of Tissemsilt - Faculty of Letters and Foreign Languages</p>
    </header>

    <div class="container">
        <div class="timer-bar">
            <span id="timerLabel" data-en="Time Remaining" data-ar="الوقت المتبقي">Time Remaining</span>
            <span id="timer">10:00</span>
        </div>

        <div class="card">
            <div class="card-header" data-en="Group Information" data-ar="معلومات المجموعة">Group Information</div>
            <div class="card-body">
                <div class="input-group">
                    <label data-en="Group Name *" data-ar="اسم المجموعة *">Group Name *</label>
                    <input type="text" id="groupName" placeholder="...">
                </div>
                <div class="input-group">
                    <label data-en="Student 1 Name *" data-ar="اسم الطالب 1 *">Student 1 Name *</label>
                    <input type="text" id="student1" placeholder="...">
                </div>
                <div class="input-group">
                    <label data-en="Student 2 Name (Optional)" data-ar="اسم الطالب 2 (اختياري)">Student 2 Name (Optional)</label>
                    <input type="text" id="student2">
                </div>
            </div>
        </div>

        <div id="questions-container"></div>

        <button class="submit-btn" onclick="submitQuiz()" data-en="Submit & Download Results" data-ar="إرسال وتحميل النتائج">Submit & Download Results</button>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-en="Results Summary" data-ar="ملخص النتائج">Results Summary</h2>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                question: {
                    en: "When using Google Drive synchronization, where are files that have been shared with you by others located by default?",
                    ar: "عند استخدام ميزة المزامنة في Google Drive، أين تجد الملفات التي قام أشخاص آخرون بمشاركتها معك؟"
                },
                options: {
                    en: ["Computers folder", "Shared with me section", "Trash folder", "Google Photos", "Starred area"],
                    ar: ["مجلد أجهزة الكمبيوتر (Computers)", "قسم تمت مشاركتها معي (Shared with me)", "سلة المهملات (Trash)", "صور جوجل (Google Photos)", "المساحة المميزة بنجمة (Starred)"]
                },
                correct: 1
            },
            {
                id: 2,
                question: {
                    en: "What is the main advantage of using the 'Offline' mode in Google Drive settings?",
                    ar: "ما هي الميزة الأساسية لاستخدام 'وضع عدم الاتصال' في إعدادات Google Drive؟"
                },
                options: {
                    en: ["It makes your computer run faster", "You can edit Docs/Sheets without internet", "It deletes old files automatically", "It prevents others from seeing files", "It increases storage limit"],
                    ar: ["يجعل الكمبيوتر يعمل بشكل أسرع", "يمكنك تحرير الملفات بدون اتصال بالإنترنت", "يحذف الملفات القديمة تلقائياً", "يمنع الآخرين من رؤية ملفاتك", "يزيد من مساحة التخزين"]
                },
                correct: 1
            },
            {
                id: 3,
                question: {
                    en: "If you want to share a file so a classmate can read it but NOT change any text, which permission should you choose?",
                    ar: "إذا أردت مشاركة ملف ليقرأه زميلك دون أن يتمكن من تعديل النص، أي إذن تختار؟"
                },
                options: {
                    en: ["Editor", "Owner", "Manager", "Viewer", "Administrator"],
                    ar: ["محرر (Editor)", "مالك (Owner)", "مدير (Manager)", "مشاهد (Viewer)", "مسؤول (Administrator)"]
                },
                correct: 3
            },
            {
                id: 4,
                question: {
                    en: "When you move a file into a 'Shared Folder' owned by your teacher, who can see that file?",
                    ar: "عندما تنقل ملفاً إلى 'مجلد مشترك' يملكه أستاذك، من يمكنه رؤية هذا الملف؟"
                },
                options: {
                    en: ["Only you", "Only the teacher", "Anyone with access to that shared folder", "Everyone on the internet", "Only people with a direct link"],
                    ar: ["أنت فقط", "الأستاذ فقط", "أي شخص لديه حق الوصول لهذا المجلد", "الجميع على الإنترنت", "فقط من لديهم رابط مباشر"]
                },
                correct: 2
            },
            {
                id: 5,
                question: {
                    en: "In Google Drive for Desktop, what happens if you choose the 'Mirror files' synchronization option?",
                    ar: "في تطبيق Google Drive للحاسوب، ماذا يحدث إذا اخترت خيار 'مرآة الملفات' (Mirror files)؟"
                },
                options: {
                    en: ["Files are deleted from the cloud", "Files are stored only in the cloud", "All files are stored both in the cloud and locally", "Files are converted to shortcuts", "Files are compressed to save space"],
                    ar: ["يتم حذف الملفات من السحاب", "يتم تخزين الملفات في السحاب فقط", "يتم تخزين جميع الملفات في السحاب وعلى الجهاز معاً", "تتحول الملفات إلى اختصارات", "يتم ضغط الملفات لتوفير المساحة"]
                },
                correct: 2
            },
            {
                id: 6,
                question: {
                    en: "To log in to the University of Tissemsilt Moodle platform, what information is typically required?",
                    ar: "لتسجيل الدخول إلى منصة مودل لجامعة تيسمسيلت، ما هي المعلومات المطلوبة عادةً؟"
                },
                options: {
                    en: ["Full name and date of birth", "Facebook account", "Username and Password provided by university", "Personal phone number", "Student ID only"],
                    ar: ["الاسم الكامل وتاريخ الميلاد", "حساب فيسبوك", "اسم المستخدم وكلمة السر المسلمة من الجامعة", "رقم الهاتف الشخصي", "رقم بطاقة الطالب فقط"]
                },
                correct: 2
            },
            {
                id: 7,
                question: {
                    en: "What is the correct navigation path to access the 'CIVILIZATION OF THE TARGET LANGUAGE' course?",
                    ar: "ما هو مسار التنقل الصحيح للوصول إلى مقياس 'CIVILIZATION OF THE TARGET LANGUAGE'؟"
                },
                options: {
                    en: [
                        "Cours --> Faculté des lettres et des langues --> Département des lettres et langue anglaise --> 2eme Annee Licence --> Semestre 4 --> CIVILIZATION OF THE TARGET LANGUAGE",
                        "Cours --> 2eme Annee Licence --> Département des lettres et langue anglaise --> Faculté des lettres et des langues --> Semestre 4 --> CIVILIZATION",
                        "Cours --> Département des lettres et langue anglaise --> 2eme Annee Licence --> Faculté des lettres et des langues --> Semestre 4 --> CIVILIZATION",
                        "Cours --> Faculté des lettres et des langues --> Semestre 4 --> 2eme Annee Licence --> Département des lettres et langue anglaise --> CIVILIZATION",
                        "Cours --> Semestre 4 --> 2eme Annee Licence --> Faculté des lettres et des langues --> Département des lettres et langue anglaise --> CIVILIZATION"
                    ],
                    ar: [
                        "الخيار أ: المسار المتسلسل (كلية -> قسم -> سنة ثانية -> سداسي 4)",
                        "الخيار ب: مسار عشوائي يبدأ بالسنة الثانية",
                        "الخيار ج: مسار يبدأ بالقسم قبل الكلية",
                        "الخيار د: مسار يبدأ بالسداسي قبل السنة",
                        "الخيار هـ: مسار غير مرتب"
                    ]
                },
                correct: 0
            }
        ];

        let currentLang = 'en';
        let answers = {};
        let timeLeft = 600;

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const qText = q.question[currentLang];
                const opts = q.options[currentLang];
                
                let html = `<div class="question-card" id="q-card-${q.id}">
                    <div class="question-header">
                        <span class="question-number">${index + 1}</span>
                        <span class="question-title">${qText}</span>
                    </div>`;
                
                opts.forEach((opt, i) => {
                    const isSelected = answers[q.id] === i;
                    html += `
                        <label class="option ${isSelected ? 'selected' : ''}" onclick="handleSelect(${q.id}, ${i})">
                            <input type="radio" name="q${q.id}" ${isSelected ? 'checked' : ''}>
                            <span>${opt}</span>
                        </label>`;
                });
                
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        function handleSelect(qId, optIdx) {
            answers[qId] = optIdx;
            renderQuestions();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelector('.lang-btn').textContent = currentLang === 'en' ? 'العربية' : 'English';
            
            // Update static labels
            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = el.getAttribute('data-' + currentLang);
            });
            
            renderQuestions();
        }

        function startTimer() {
            const timerDisplay = document.getElementById('timer');
            const interval = setInterval(() => {
                timeLeft--;
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                timerDisplay.textContent = `${min < 10 ? '0'+min : min}:${sec < 10 ? '0'+sec : sec}`;
                
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    submitQuiz();
                }
            }, 1000);
        }

        function submitQuiz() {
            const group = document.getElementById('groupName').value;
            const s1 = document.getElementById('student1').value;

            if (!group || !s1) {
                alert(currentLang === 'en' ? "Please enter Group Name and Student 1 Name" : "يرجى إدخال اسم المجموعة والطالب 1 على الأقل");
                return;
            }

            let score = 0;
            questions.forEach(q => {
                if (answers[q.id] === q.correct) score++;
            });

            // Generate CSV
            let csvContent = "QuestionID,AnswerIndex,Correct\n";
            questions.forEach(q => {
                csvContent += `${q.id},${answers[q.id] ?? 'None'},${answers[q.id] === q.correct}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${group}_results.csv`;
            a.click();

            // Show results
            document.getElementById('modalBody').innerHTML = `
                <div class="score-box">
                    <div class="score">${score} / ${questions.length}</div>
                    <p>${currentLang === 'en' ? 'Great job!' : 'عمل جيد!'}</p>
                </div>
                <p><strong>Group:</strong> ${group}</p>
                <p><strong>Status:</strong> Results downloaded as CSV.</p>
            `;
            document.getElementById('resultModal').classList.add('active');
        }

        // Initialize
        renderQuestions();
        startTimer();
    </script>
</body>
</html>
